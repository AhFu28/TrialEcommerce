<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Success — Faiz Store</title>
  
  <link rel="stylesheet" href="./css/design-system.css">
  <link rel="stylesheet" href="./css/components.css">
  
  <style>
    .success-container {
      max-width: 600px;
      margin: var(--space-12) auto;
      text-align: center;
      padding: var(--space-8);
      background: white;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
    }
    
    .success-icon {
      width: 80px;
      height: 80px;
      background: rgba(39, 174, 96, 0.1);
      color: #27ae60;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto var(--space-6);
    }
    
    .success-title {
      font-family: var(--font-heading);
      font-size: var(--text-3xl);
      color: var(--color-text-primary);
      margin-bottom: var(--space-2);
    }
    
    .success-subtitle {
      color: var(--color-text-secondary);
      font-size: var(--text-lg);
      margin-bottom: var(--space-6);
    }

    .order-box {
      background: var(--color-bg);
      padding: var(--space-6);
      border-radius: var(--radius-md);
      margin-bottom: var(--space-8);
      text-align: left;
    }

    .order-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: var(--space-2);
      font-size: var(--text-base);
    }

    .order-row strong {
      color: var(--color-text-primary);
    }
  </style>
</head>
<body style="background-color: var(--color-bg);">
  
  <!-- Header Navbar -->
  <div id="main-navbar"></div>

  <main class="container fade-in">
    <div class="success-container">
      <div class="success-icon">
        <svg viewBox="0 0 24 24" width="40" height="40" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>
      
      <h1 class="success-title">Order Successful!</h1>
      <p class="success-subtitle">Thank you for shopping at Faiz Store. Your order has been placed and is being processed.</p>

      <div class="order-box">
        <div class="order-row">
          <span>Order Number</span>
          <strong id="order-id">#ORD-XXXXXX</strong>
        </div>
        <div class="order-row">
          <span>Date</span>
          <strong id="order-date">-</strong>
        </div>
        <div class="order-row">
          <span>Total Amount</span>
          <strong id="order-total">Rp 0</strong>
        </div>
      </div>

      <a href="catalog.html" class="btn btn--primary btn--lg">Continue Shopping</a>
    </div>
  </main>

  <!-- Footer -->
  <div id="main-footer"></div>

  <!-- Scripts -->
  <script src="./js/config.js"></script>
  <script src="./js/store.js"></script>
  <script src="./js/auth.js"></script>
  <script src="./js/main.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const orderId = urlParams.get('id');
      
      if (!orderId) {
        window.location.href = 'index.html';
        return;
      }

      const orders = Store.getOrders();
      const order = orders.find(o => o.id === orderId);

      if (order) {
        document.getElementById('order-id').textContent = order.id;
        document.getElementById('order-date').textContent = new Date(order.date).toLocaleDateString('id-ID', {
          year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit'
        });
        document.getElementById('order-total').textContent = Store.formatCurrency(order.total);
      }
    });
  </script>
</body>
</html>
