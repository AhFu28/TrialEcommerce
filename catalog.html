<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catalog — Faiz Store</title>
  
  <link rel="stylesheet" href="./css/design-system.css">
  <link rel="stylesheet" href="./css/components.css">
  <link rel="stylesheet" href="./css/pages/catalog.css">
</head>
<body>
  <!-- Navbar -->
  <div id="main-navbar"></div>

  <main class="container">
    <div class="catalog-layout">
      
      <!-- Sidebar -->
      <aside class="catalog-sidebar fade-in">
        <h2 class="filter-title" style="font-size: 1.25rem; margin-bottom: 1.5rem;">Filters</h2>
        
        <div class="filter-section">
          <h3 class="filter-title">Category</h3>
          <label class="filter-label"><input type="checkbox" checked> Electronics</label>
          <label class="filter-label"><input type="checkbox"> Fashion</label>
          <label class="filter-label"><input type="checkbox"> Home & Living</label>
          <label class="filter-label"><input type="checkbox"> Beauty</label>
        </div>

        <div class="filter-section">
          <h3 class="filter-title">Price Range</h3>
          <div class="price-inputs">
            <input type="text" placeholder="Min">
            <span>-</span>
            <input type="text" placeholder="Max">
          </div>
          <button class="btn btn--secondary btn--full btn--sm">Apply</button>
        </div>

        <div class="filter-section">
          <h3 class="filter-title">Rating</h3>
          <label class="filter-label">
            <input type="radio" name="rating">
            <span style="color: var(--color-warning);">★★★★★</span>
          </label>
          <label class="filter-label">
            <input type="radio" name="rating">
            <span style="color: var(--color-warning);">★★★★☆</span> & Up
          </label>
        </div>
      </aside>

      <!-- Main Content -->
      <section class="catalog-main fade-in">
        <div class="catalog-header">
          <div class="catalog-results-text">Showing 1-12 of 145 products</div>
          <div class="catalog-sort">
            <label for="sort-select">Sort by:</label>
            <select id="sort-select">
              <option>Most Relevant</option>
              <option>Price: Low to High</option>
              <option>Price: High to Low</option>
              <option>Newest Arrivals</option>
            </select>
          </div>
        </div>

        <div class="catalog-grid" id="catalog-products">
          <!-- Injected via JavaScript -->
        </div>

        <div class="pagination">
          <button class="page-btn">&lsaquo;</button>
          <button class="page-btn active">1</button>
          <button class="page-btn">2</button>
          <button class="page-btn">3</button>
          <span>...</span>
          <button class="page-btn">12</button>
          <button class="page-btn">&rsaquo;</button>
        </div>
      </section>
    </div>
  </main>

  <!-- Footer -->
  <div id="main-footer"></div>

  <!-- Scripts -->
  <script src="./js/config.js"></script>
  <script src="./js/i18n.js"></script>
  <script src="./js/store.js"></script>
  <script src="./js/auth.js"></script>
  <script src="./js/main.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const grid = document.getElementById('catalog-products');
      let products = Store.getAllProducts();

      // Duplicate products artificially to match the 12+ look of Faiz Store
      while(products.length > 0 && products.length < 8) {
        products = products.concat(products).slice(0, 8);
      }

      if (products.length === 0) {
        grid.innerHTML = '<p>No products found.</p>';
        return;
      }

      grid.innerHTML = products.map(p => `
        <div class="card">
          <a href="product.html?id=${p.id}" class="card__img-wrap">
            <img src="${p.image}" alt="${p.name}" class="card__img" loading="lazy">
            <div class="card__badges">
              ${p.isOfficial ? '<span class="badge badge--pill badge--official">Official Store</span>' : ''}
              ${p.isBestSeller ? '<span class="badge badge--pill badge--bestseller">Best Seller</span>' : ''}
            </div>
          </a>
          <div class="card__body">
            <a href="product.html?id=${p.id}"><h3 class="card__title">${p.name}</h3></a>
            <div class="card__price">${Store.formatCurrency(p.price)}</div>
            <div class="card__meta">
              <span class="card__meta-star">★ 4.9</span>
              <span>(1.2k)</span>
            </div>
            <button class="btn btn--primary btn--full btn--sm" style="margin-top: auto;" onclick="Store.addToCart('${p.id}')">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 4px;"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
              Add
            </button>
          </div>
        </div>
      `).join('');
    });
  </script>
</body>
</html>
